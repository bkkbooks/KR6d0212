body:
  text: 夫欲念誦滅罪障助菩提應須發願先淨三業十指合掌面向諸佛口陳辭句作如是言弟子比丘某甲餘衆各準此稱名稽首和南一心歸命盡十方三世一切諸佛尊法般若十二部經真淨妙法諸大菩薩摩訶薩衆諸賢聖僧常住三寶唯願神力慈哀護念願當證知以此念誦善根功德專用莊嚴四恩三有盡十方法界一切衆生願共法界諸衆生等從無始已來至於今日昏沈倒惑六根三業造一切鄣道之罪若粗若細齊佛所知一時消滅生生世世永離地獄餓鬼畜生身永離女人身永離邊地下賤八難身願共法界諸衆生等若於此生若於餘生常值善知識常聞無上大乘正法即於此身悟解常住佛性大涅槃海一切諸法本來寂滅具大菩提了達根塵能所一念起心具一切法百界三千空假中即法界印不可思議心佛衆生三無差別體權識實發大菩提心上求下化生死苦與究竟樂修牢強精進四種三昧只不思議一觀三觀觀不思議一諦三諦觀諦冥一即四魔三鄣歷緣對境以妙十法成圓乘行解更資心心明寂發真中道開佛知見心心現前所有慧身不由他悟自然流入薩婆若海住無生忍具大智慧成摩訶衍通達漸頓諸教破一微塵出大千經卷恆沙佛法一心中曉學佛慈悲無諸慳吝説於止觀遍施一切開門傾藏捨如意珠理即名字觀行相似分真究竟圓伊三點不縱不橫正法大城金剛寶藏一切佛法自行化他一生有辦設未明了非因之因從因感果不果之果獲勝果報願共法界諸衆生等臨命終時七日之前自知時節心不顛倒心不錯亂心不共念身心無諸苦痛跏趺正念身心安樂入深三昧見十方佛願彌陀世尊三世諸佛觀音勢至諸大菩薩一切聖衆不捨本誓悉現在前同時放大光明照觸身心所有罪障一時消滅諸根豁然深入知見以大神力攝受身心授金色手摩頂接引歡喜踊躍乘佛願力坐金剛臺隨從如來聖衆於一念頃上品上生西方阿彌陀佛極樂世界金蓮化生悟入無生寂滅諸忍超登上地獲六神通住首楞嚴不動法性於一念頃遊歷十方奉事三世一切諸佛一一佛前悉有我身修諸供養聞法受記一時普能受持三世如來甚深法海即自明解不由他悟大理大願大莊嚴大智斷大遍知大道大用大權實大利益大無住諸佛所有一切波羅蜜行一時修習與文殊普賢等諸大士為伴侶具足一切諸菩薩無量無邊廣大行願得諸大陀羅尼門諸三昧門普知諸佛剎嚴淨佛國於剎那頃普於十方一切微塵道中成等正覺轉大法輪度脫衆生無緣慈悲普覆法界不動真際普入三世度脫一切衆生或作佛身施權實或為九界像對揚漸頓請轉漸頓弘通漸頓三輪攝化攝化無窮同虗空遍界而作佛事從本垂迹攝迹還本本迹雖殊不思議一自他行圓常住祕藏法界怨親同斯願海
